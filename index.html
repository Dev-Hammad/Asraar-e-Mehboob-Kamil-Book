<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Noorani Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #1a1714; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    #topBar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: #1a1714;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      flex-shrink: 0; z-index: 10;
    }
    .top-left, .top-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .icon-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.93); }

    .page-nav-btn {
      height: 36px; padding: 0 16px; border-radius: 8px;
      background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: background 0.15s, transform 0.1s;
    }
    .page-nav-btn:active { background: rgba(255,255,255,0.18); transform: scale(0.96); }

    .page-pill {
      background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 0 14px; height: 36px;
      display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.6); font-size: 13px;
    }
    .page-pill strong { color: rgba(255,255,255,0.9); font-weight: 500; font-size: 14px; font-variant-numeric: tabular-nums; }

    #scrollArea {
      flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center;
      -webkit-overflow-scrolling: touch; padding: 20px 16px; background: #1a1714;
    }

    #pageImg {
      display: block; border-radius: 6px; max-width: none;
      box-shadow: 0 0 0 0.5px rgba(255,255,255,0.06), 0 8px 40px rgba(0,0,0,0.6);
      transition: width 0.06s, height 0.06s; will-change: width, height; user-select: none;
    }

    #bottomBar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 20px; background: #1a1714;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      flex-shrink: 0; gap: 12px;
    }

    .zoom-strip { display: flex; align-items: center; gap: 8px; flex: 1; }
    .zoom-label { font-size: 12px; color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 36px; text-align: right; }

    input[type=range] {
      flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.15); border-radius: 4px; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      background: #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .goto-strip { display: flex; align-items: center; gap: 6px; }
    .goto-strip input {
      width: 54px; height: 32px; border-radius: 7px;
      background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9); text-align: center; font-size: 13px; font-weight: 500; padding: 0 4px;
    }
    .goto-strip input:focus { outline: none; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); }
    .goto-strip button {
      height: 32px; padding: 0 12px; border-radius: 7px; font-size: 12px; font-weight: 500;
      background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85); cursor: pointer; transition: background 0.15s;
    }
    .goto-strip button:active { background: rgba(255,255,255,0.22); }

    #loader {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.7); border-radius: 12px; padding: 14px 24px;
      color: rgba(255,255,255,0.8); font-size: 13px; backdrop-filter: blur(8px);
      display: none; align-items: center; gap: 10px; z-index: 50;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }

    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
      padding: 7px 18px; border-radius: 40px; font-size: 13px; z-index: 100;
      pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    #hint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.75); color: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
      padding: 12px 24px; border-radius: 40px; font-size: 13px; z-index: 90;
      pointer-events: none; text-align: center; line-height: 1.7;
      animation: hintFade 4s ease forwards;
    }
    @keyframes hintFade { 0%,60% { opacity:1; } 100% { opacity:0; visibility:hidden; } }

    @media (max-width: 540px) {
      .page-nav-btn span { display: none; }
      .goto-strip input { width: 46px; }
    }
    @media (max-width: 420px) {
      .zoom-strip { display: none; }
      #topBar, #bottomBar { padding: 8px 12px 12px; }
      #scrollArea { padding: 12px 8px; }
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { display: none; }
  </style>
</head>
<body>

<div id="topBar">
  <div class="top-left">
    <button class="page-nav-btn" id="prevBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="9,2 4,7 9,12"/></svg>
      <span>Prev</span>
    </button>
    <button class="page-nav-btn" id="nextBtn">
      <span>Next</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="5,2 10,7 5,12"/></svg>
    </button>
  </div>

  <div class="page-pill">
    <strong id="pageNum">1</strong>
    <span>/</span>
    <span id="totalNum">934</span>
  </div>

  <div class="top-right">
    <button class="icon-btn" id="fitBtn" title="Fit to screen">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="1" width="5" height="5" rx="1"/>
        <rect x="10" y="1" width="5" height="5" rx="1"/>
        <rect x="1" y="10" width="5" height="5" rx="1"/>
        <rect x="10" y="10" width="5" height="5" rx="1"/>
      </svg>
    </button>
  </div>
</div>

<div id="scrollArea">
  <img id="pageImg" alt="Book page" draggable="false">
</div>

<div id="bottomBar">
  <div class="zoom-strip">
    <button class="icon-btn" id="zoomOutBtn" style="width:32px;height:32px;border-radius:7px;font-size:16px;">−</button>
    <input type="range" id="zoomSlider" min="0" max="100" value="40" step="1">
    <button class="icon-btn" id="zoomInBtn" style="width:32px;height:32px;border-radius:7px;font-size:16px;">+</button>
    <span class="zoom-label" id="zoomLabel">45%</span>
  </div>
  <div class="goto-strip">
    <input type="number" id="gotoInput" placeholder="Pg" min="1" max="934">
    <button id="gotoBtn">Go</button>
  </div>
</div>

<div id="loader"><div class="spin"></div> Loading…</div>
<div id="toast"></div>

<script>
const ARCHIVE_BASE = "https://ia803205.us.archive.org/view_archive.php?archive=/29/items/Asraar-e-Mehboob-Kamil._20260528/Asraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_jp2.zip&file=Asraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_jp2%2FAsraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_";
const TOTAL = 934;
let cur = 0, zoom = 0.45, natW = 0, natH = 0, busy = false;
const preload = {};
let toastTimer = null;

const $scroll = document.getElementById('scrollArea');
const $img = document.getElementById('pageImg');
const $loader = document.getElementById('loader');
const $toast = document.getElementById('toast');
const $slider = document.getElementById('zoomSlider');
const $zLabel = document.getElementById('zoomLabel');
const $pageNum = document.getElementById('pageNum');
const $gotoInput = document.getElementById('gotoInput');

function url(idx) {
  return ARCHIVE_BASE + String(idx).padStart(4,'0') + ".jp2&ext=jpg";
}

function toast(msg, dur=1000) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), dur);
}

function updateSlider() {
  const minZ=0.3, maxZ=2.8;
  let t = (zoom - minZ)/(maxZ-minZ);
  $slider.value = Math.round(Math.min(1,Math.max(0,t))*100);
  $zLabel.textContent = Math.round(zoom*100)+'%';
}

function applyZoom() {
  if (!natW) return;
  $img.style.width = (natW*zoom)+'px';
  $img.style.height = (natH*zoom)+'px';
  updateSlider();
  try { localStorage.setItem('nr_zoom', zoom); } catch(e) {}
}

function fitScale() {
  if (!natW) return 0.45;
  const cw = $scroll.clientWidth - 32, ch = $scroll.clientHeight - 40;
  return Math.min(2.4, Math.max(0.3, Math.min(cw/natW, ch/natH)));
}

function fit() {
  zoom = fitScale();
  applyZoom();
  $scroll.scrollLeft = 0; $scroll.scrollTop = 0;
  toast('Fit to screen', 700);
}

function zoomIn()  { zoom = Math.min(2.8, zoom+0.12); applyZoom(); toast(Math.round(zoom*100)+'%', 400); }
function zoomOut() { zoom = Math.max(0.3, zoom-0.12); applyZoom(); toast(Math.round(zoom*100)+'%', 400); }

function preloadNeighbors(p) {
  [p+1, p+2, p-1].filter(x => x>=0 && x<TOTAL).forEach(x => {
    if (!preload[x]) { const i = new Image(); i.src = url(x); preload[x] = i; }
  });
  Object.keys(preload).forEach(k => { if (Math.abs(k-p) > 6) delete preload[k]; });
}

function loadPage(idx) {
  if (idx < 0 || idx >= TOTAL) { toast(idx < 0 ? 'First page' : 'Last page', 800); return; }
  if (busy) return;
  busy = true;
  $loader.style.display = 'flex';
  const cached = preload[idx];
  if (cached && cached.complete && cached.naturalWidth > 0) { applyPage(cached, idx); return; }
  const i = new Image();
  i.onload = () => applyPage(i, idx);
  i.onerror = () => { $loader.style.display='none'; busy=false; toast('Load failed, retrying…'); setTimeout(() => loadPage(idx), 800); };
  i.src = url(idx);
}

function applyPage(img, idx) {
  if (!img.naturalWidth) { $loader.style.display='none'; busy=false; return; }
  natW = img.naturalWidth; natH = img.naturalHeight;
  $img.src = img.src;
  cur = idx;
  $pageNum.textContent = cur + 1;
  $gotoInput.value = cur + 1;
  zoom = Math.min(2.8, Math.max(0.3, zoom));
  applyZoom();
  $scroll.scrollLeft = 0; $scroll.scrollTop = 0;
  $loader.style.display = 'none';
  busy = false;
  preloadNeighbors(cur);
  preload[cur] = img;
  try { localStorage.setItem('nr_page', cur); } catch(e) {}

  if (!localStorage.getItem('nr_hint_shown')) {
    localStorage.setItem('nr_hint_shown', '1');
    const h = document.createElement('div'); h.id = 'hint';
    h.textContent = 'Pinch to zoom  ·  Arrow keys to turn pages';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }
}

function goTo(num) {
  const p = parseInt(num);
  if (isNaN(p)) { toast('Enter 1–' + TOTAL); return; }
  loadPage(Math.min(TOTAL, Math.max(1, p)) - 1);
}

document.getElementById('prevBtn').addEventListener('click', () => loadPage(cur-1));
document.getElementById('nextBtn').addEventListener('click', () => loadPage(cur+1));
document.getElementById('fitBtn').addEventListener('click', fit);
document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
document.getElementById('gotoBtn').addEventListener('click', () => goTo($gotoInput.value));
$gotoInput.addEventListener('keydown', e => { if (e.key === 'Enter') goTo($gotoInput.value); });
$slider.addEventListener('input', function() {
  const minZ=0.3, maxZ=2.8;
  zoom = minZ + (this.value/100) * (maxZ-minZ);
  applyZoom();
});

document.addEventListener('keydown', e => {
  if (document.activeElement?.tagName === 'INPUT') return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); loadPage(cur+1); }
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); loadPage(cur-1); }
  else if (e.key==='+'||e.key==='=') { e.preventDefault(); zoomIn(); }
  else if (e.key==='-') { e.preventDefault(); zoomOut(); }
  else if (e.key==='0'||e.key==='f') { e.preventDefault(); fit(); }
});

let pinchDist = 0, pinchZoom = 1;
$scroll.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    pinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    pinchZoom = zoom;
  }
}, {passive: false});
$scroll.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchDist > 0) {
    e.preventDefault();
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const nz = Math.min(2.8, Math.max(0.3, pinchZoom*(d/pinchDist)));
    if (Math.abs(nz-zoom) > 0.01) { zoom = nz; applyZoom(); }
  }
}, {passive: false});
$scroll.addEventListener('touchend', () => { pinchDist = 0; });
$scroll.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) { e.preventDefault(); e.deltaY < 0 ? zoomIn() : zoomOut(); }
}, {passive: false});

(function init() {
  try {
    const sp = localStorage.getItem('nr_page');
    if (sp && !isNaN(+sp)) { const p = +sp; if (p >= 0 && p < TOTAL) cur = p; }
    const sz = localStorage.getItem('nr_zoom');
    if (sz && !isNaN(+sz)) { const z = +sz; if (z >= 0.3 && z <= 2.8) zoom = z; }
  } catch(e) {}
  document.getElementById('totalNum').textContent = TOTAL;
  loadPage(cur);
})();
</script>
</body>
</html>
