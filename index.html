<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Noorani Viewer | اسرار محبوب کامل | Fluid Reading Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #e8e0d5;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .scroll-container {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background: #e8e0d5;
            position: relative;
            scroll-behavior: smooth;
        }

        .image-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-width: 100%;
            min-height: 100%;
            background: #e8e0d5;
            padding: 20px;
        }

        #pageImage {
            display: block;
            max-width: none;
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 248, 225, 0.5);
            border-radius: 4px;
            background: #fffef7;
            transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), height 0.2s ease;
        }

        .toolbar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(25, 20, 15, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 215, 150, 0.2);
            border: none;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .toolbar button {
            background: rgba(255, 245, 225, 0.18);
            border: none;
            color: #ffefcf;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-family: inherit;
        }

        .toolbar button:active {
            background: rgba(255, 210, 140, 0.4);
            transform: scale(0.96);
        }

        .toolbar .page-info {
            background: rgba(0, 0, 0, 0.55);
            color: #ffdfb3;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: 600;
            font-size: 14px;
        }

        .goto-group {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 48px;
            padding: 3px 8px 3px 16px;
            gap: 6px;
        }

        .goto-group input {
            background: rgba(255, 250, 240, 0.2);
            border: none;
            color: #fff2e0;
            font-size: 14px;
            width: 60px;
            padding: 6px 8px;
            border-radius: 36px;
            text-align: center;
            font-family: monospace;
            font-weight: 600;
        }

        .goto-group input:focus {
            outline: none;
            background: rgba(255, 235, 200, 0.35);
        }

        .goto-group button {
            background: #c9772e;
            padding: 6px 14px;
            font-size: 13px;
            min-width: auto;
        }

        .zoom-slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.45);
            padding: 4px 14px;
            border-radius: 48px;
        }

        .zoom-slider-container span {
            font-size: 13px;
            color: #ffdebc;
        }

        #zoomPercentSlider {
            width: 110px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 220, 160, 0.4);
            border-radius: 10px;
        }

        #zoomPercentSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ffcd94;
            border-radius: 50%;
            cursor: pointer;
        }

        .zoom-value {
            min-width: 42px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            color: #ffddb0;
        }

        .zoom-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            color: #ffe1b9;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-family: monospace;
            z-index: 1000;
            pointer-events: none;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 22, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: #fad6a5;
            flex-direction: column;
            gap: 18px;
        }

        .spinner {
            width: 46px;
            height: 46px;
            border: 3px solid rgba(255, 210, 140, 0.25);
            border-top-color: #ffcd94;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .swipe-area {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 15%;
            z-index: 900;
            background: transparent;
        }
        .swipe-left { left: 0; }
        .swipe-right { right: 0; }

        .toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1915e6;
            color: #ffd6a5;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1500;
            white-space: nowrap;
            pointer-events: none;
        }

        @media (max-width: 760px) {
            .toolbar { padding: 8px 12px; gap: 6px; }
            .toolbar button { padding: 5px 10px; font-size: 12px; }
            .goto-group input { width: 50px; font-size: 11px; }
            #zoomPercentSlider { width: 85px; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="prevBtn">◀ Prev</button>
    <span class="page-info" id="pageInfo">-- / --</span>
    <button id="nextBtn">Next ▶</button>
    <div class="goto-group">
        <input type="number" id="gotoPageInput" placeholder="Pg" min="1" max="934">
        <button id="gotoBtn">Go</button>
    </div>
    <div class="zoom-slider-container">
        <span>🔍</span>
        <input type="range" id="zoomPercentSlider" min="0" max="100" value="45" step="1">
        <span id="zoomPercentLabel" class="zoom-value">45%</span>
    </div>
    <button id="resetZoomBtn">⊡ Fit</button>
    <button id="zoomMinusBtn">−</button>
    <button id="zoomPlusBtn">+</button>
</div>
<div class="zoom-badge" id="zoomBadge">📖 45%</div>

<div class="swipe-area swipe-left"></div>
<div class="swipe-area swipe-right"></div>

<div id="loadingOverlay" class="loading" style="display: none;">
    <div class="spinner"></div>
    <div>Loading page...</div>
</div>

<div class="scroll-container" id="scrollContainer">
    <div class="image-wrapper" id="imageWrapper">
        <img id="pageImage" alt="Islamic Book Page">
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    // ====================== CORRECT URL CONFIGURATION ======================
    // Base archive URL
    const ARCHIVE_BASE = "https://ia803205.us.archive.org/view_archive.php?archive=/29/items/Asraar-e-Mehboob-Kamil._20260528/Asraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_jp2.zip&file=Asraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_jp2%2FAsraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_";
    
    // Pages: 0000.jpg to 0933.jpg (total 934 pages from 0 to 933)
    // First page is _0000.jp2, last page is _0933.jp2
    const TOTAL_PAGES = 934;  // 0 to 933 inclusive = 934 pages
    let currentPage = 0;      // 0-indexed (0 = page 1)
    
    // GLOBAL ZOOM variables
    let currentZoomFactor = 0.45;
    let originalWidth = 0, originalHeight = 0;
    
    // DOM refs
    const $container = $('#scrollContainer');
    const $image = $('#pageImage');
    const $slider = $('#zoomPercentSlider');
    const $zoomLabel = $('#zoomPercentLabel');
    const $badge = $('#zoomBadge');
    
    // Helper: get JPG URL - uses 4-digit zero-padded number (0000 to 0933)
    function getPageUrl(pageIndex) {
        // pageIndex is 0-based, convert to 4-digit with leading zeros
        const pageNum = pageIndex.toString().padStart(4, '0');
        return ARCHIVE_BASE + pageNum + ".jp2&ext=jpg";
    }
    
    // Compute optimal fit to screen scale
    function computeFitScale() {
        if (originalWidth === 0) return 0.45;
        const containerWidth = $container.width();
        if (containerWidth <= 0) return 0.45;
        const targetWidth = containerWidth - 40;
        let scale = targetWidth / originalWidth;
        scale = Math.min(1.5, Math.max(0.3, scale));
        return scale;
    }
    
    // Apply current zoom
    function applyZoom() {
        if (originalWidth === 0 || originalHeight === 0) return;
        const newWidth = originalWidth * currentZoomFactor;
        const newHeight = originalHeight * currentZoomFactor;
        $image.css({
            'width': newWidth + 'px',
            'height': newHeight + 'px'
        });
        
        let percentValue = ((currentZoomFactor - 0.3) / (3.0 - 0.3)) * 100;
        percentValue = Math.min(100, Math.max(0, percentValue));
        $slider.val(Math.round(percentValue));
        const displayPercent = Math.round(currentZoomFactor * 100);
        $zoomLabel.text(displayPercent + '%');
        $badge.text(`📖 ${displayPercent}%`);
    }
    
    function setZoomFromSliderPercent(percent) {
        let t = percent / 100;
        let newZoom = 0.3 + (t * (3.0 - 0.3));
        newZoom = Math.min(3.0, Math.max(0.3, newZoom));
        currentZoomFactor = newZoom;
        applyZoom();
        saveZoomPref();
    }
    
    function fitToScreen() {
        if (originalWidth === 0) return;
        const fitScaleVal = computeFitScale();
        currentZoomFactor = Math.min(3.0, Math.max(0.3, fitScaleVal));
        applyZoom();
        $container.scrollLeft(0);
        $container.scrollTop(0);
        showToast("Perfect fit — full page visible", 1000);
        saveZoomPref();
    }
    
    function zoomIn() {
        let newZoom = currentZoomFactor + 0.12;
        if (newZoom <= 3.0) {
            currentZoomFactor = newZoom;
            applyZoom();
            saveZoomPref();
        } else {
            showToast("Maximum zoom (300%)", 800);
        }
    }
    
    function zoomOut() {
        let newZoom = currentZoomFactor - 0.12;
        if (newZoom >= 0.3) {
            currentZoomFactor = newZoom;
            applyZoom();
            saveZoomPref();
        } else {
            showToast("Minimum zoom (30%)", 800);
        }
    }
    
    function saveZoomPref() {
        if (typeof(Storage) !== "undefined") {
            localStorage.setItem("noorani_book_zoom", currentZoomFactor);
        }
    }
    
    function loadZoomPref() {
        if (typeof(Storage) !== "undefined") {
            let saved = localStorage.getItem("noorani_book_zoom");
            if (saved !== null && !isNaN(parseFloat(saved))) {
                let z = parseFloat(saved);
                z = Math.min(3.0, Math.max(0.3, z));
                currentZoomFactor = z;
            } else {
                currentZoomFactor = 0.45;
            }
        }
    }
    
    // Load page
    function loadPage(pageIndex) {
        if (pageIndex < 0 || pageIndex >= TOTAL_PAGES) {
            if (pageIndex < 0) showToast("📕 First page");
            else showToast("📘 Last page");
            return false;
        }
        
        currentPage = pageIndex;
        const displayNumber = currentPage + 1;
        $('#pageInfo').text(`${displayNumber} / ${TOTAL_PAGES}`);
        $('#gotoPageInput').val(displayNumber);
        
        const imgUrl = getPageUrl(currentPage);
        $('#loadingOverlay').fadeIn(180);
        
        const img = new Image();
        img.onload = function() {
            originalWidth = this.width;
            originalHeight = this.height;
            $image.attr('src', imgUrl);
            
            if (currentZoomFactor < 0.3) currentZoomFactor = 0.3;
            if (currentZoomFactor > 3.0) currentZoomFactor = 3.0;
            const newW = originalWidth * currentZoomFactor;
            const newH = originalHeight * currentZoomFactor;
            $image.css({ width: newW + 'px', height: newH + 'px' });
            
            let percVal = ((currentZoomFactor - 0.3) / (3.0 - 0.3)) * 100;
            percVal = Math.min(100, Math.max(0, percVal));
            $slider.val(Math.round(percVal));
            $zoomLabel.text(Math.round(currentZoomFactor * 100) + '%');
            $badge.text(`📖 ${Math.round(currentZoomFactor * 100)}%`);
            
            $('#loadingOverlay').fadeOut(200);
            $container.scrollLeft(0);
            $container.scrollTop(0);
            preloadNearby();
        };
        
        img.onerror = () => {
            $('#loadingOverlay').fadeOut(200);
            showToast(`⚠️ Failed to load page ${displayNumber}. Retrying...`);
            setTimeout(() => {
                const retry = new Image();
                retry.onload = img.onload;
                retry.onerror = () => showToast(`Page ${displayNumber} unavailable`, 1800);
                retry.src = imgUrl;
            }, 600);
        };
        img.src = imgUrl;
        return true;
    }
    
    function preloadNearby() {
        setTimeout(() => {
            if (currentPage + 1 < TOTAL_PAGES) {
                let preImg = new Image(); preImg.src = getPageUrl(currentPage + 1);
            }
            if (currentPage - 1 >= 0) {
                let preImg = new Image(); preImg.src = getPageUrl(currentPage - 1);
            }
        }, 400);
    }
    
    function nextPage() { 
        if (currentPage < TOTAL_PAGES - 1) loadPage(currentPage + 1); 
        else showToast("Final page reached"); 
    }
    
    function prevPage() { 
        if (currentPage > 0) loadPage(currentPage - 1); 
        else showToast("First page"); 
    }
    
    function goToPage(pageNum) {
        let target = parseInt(pageNum);
        if (isNaN(target)) { showToast("Enter valid page number"); return; }
        target = Math.min(TOTAL_PAGES, Math.max(1, target));
        if (target - 1 !== currentPage) {
            loadPage(target - 1);
            showToast(`Jump to page ${target}`, 800);
        } else {
            showToast(`Already on page ${target}`);
        }
    }
    
    let toastTimeout;
    function showToast(msg, duration = 1500) {
        if (toastTimeout) clearTimeout(toastTimeout);
        let $toast = $('.toast');
        if (!$toast.length) $('body').append('<div class="toast"></div>');
        $toast = $('.toast');
        $toast.text(msg).stop(true, true).fadeIn(200);
        toastTimeout = setTimeout(() => $toast.fadeOut(280), duration);
    }
    
    // Pinch to zoom
    let initialPinch = 0, initialZoomStore = 1;
    function getDistance(e) {
        if (e.touches.length < 2) return 0;
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        return Math.hypot(dx, dy);
    }
    
    $container.on('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            initialPinch = getDistance(e);
            initialZoomStore = currentZoomFactor;
        }
    });
    
    $container.on('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            let dist = getDistance(e);
            if (initialPinch > 0) {
                let ratio = dist / initialPinch;
                let newZoom = initialZoomStore * ratio;
                newZoom = Math.min(3.0, Math.max(0.3, newZoom));
                if (Math.abs(newZoom - currentZoomFactor) > 0.01) {
                    currentZoomFactor = newZoom;
                    applyZoom();
                    saveZoomPref();
                }
            }
        }
    });
    
    // Double tap to toggle fit/zoom
    let lastTap = 0;
    $container.on('touchend', (e) => {
        let now = Date.now();
        let target = e.target;
        if (now - lastTap < 300 && ($(target).is('#pageImage') || $(target).closest('#pageImage').length)) {
            e.preventDefault();
            if (Math.abs(currentZoomFactor - computeFitScale()) < 0.08) {
                currentZoomFactor = Math.min(2.2, 1.5);
                applyZoom();
                showToast("Zoomed to 150%", 700);
            } else {
                fitToScreen();
            }
            saveZoomPref();
        }
        lastTap = now;
    });
    
    // Mouse wheel zoom with Ctrl
    $container.on('wheel', (e) => {
        if (e.ctrlKey) {
            e.preventDefault();
            if (e.deltaY < 0) zoomIn();
            else if (e.deltaY > 0) zoomOut();
        }
    });
    
    // Keyboard controls
    $(document).keydown((e) => {
        switch(e.key) {
            case 'ArrowRight': e.preventDefault(); nextPage(); break;
            case 'ArrowLeft': e.preventDefault(); prevPage(); break;
            case '+': case '=': e.preventDefault(); zoomIn(); break;
            case '-': case '_': e.preventDefault(); zoomOut(); break;
            case '0': e.preventDefault(); fitToScreen(); break;
            case 'Enter': 
                if (document.activeElement?.id === 'gotoPageInput') { 
                    e.preventDefault(); 
                    goToPage($('#gotoPageInput').val()); 
                } 
                break;
        }
    });
    
    // UI Events
    $('#prevBtn').on('click', prevPage);
    $('#nextBtn').on('click', nextPage);
    $('#resetZoomBtn').on('click', fitToScreen);
    $('#zoomMinusBtn').on('click', zoomOut);
    $('#zoomPlusBtn').on('click', zoomIn);
    
    $slider.on('input', function() {
        let val = parseInt($(this).val());
        setZoomFromSliderPercent(val);
    });
    
    $('#gotoBtn').on('click', () => goToPage($('#gotoPageInput').val()));
    $('#gotoPageInput').on('keypress', (e) => { if (e.which === 13) goToPage($('#gotoPageInput').val()); });
    
    $('.swipe-left').on('click', prevPage);
    $('.swipe-right').on('click', nextPage);
    
    // Initialize
    $(document).ready(function() {
        loadZoomPref();
        loadPage(0);  // Start with first page (_0000.jp2)
        
        $slider.attr('min', 0).attr('max', 100);
        $('.goto-group input').attr('placeholder', `1-${TOTAL_PAGES}`);
        
        // Auto fit to screen on first load (if no saved zoom)
        if (typeof(Storage) !== "undefined" && !localStorage.getItem("noorani_book_zoom")) {
            setTimeout(() => {
                if (originalWidth > 0) {
                    fitToScreen();
                }
            }, 300);
        }
    });
    
    $image.on('load', function() {
        if (originalWidth === 0 && this.naturalWidth) {
            originalWidth = this.naturalWidth;
            originalHeight = this.naturalHeight;
            applyZoom();
        }
    });
</script>
</body>
</html>
