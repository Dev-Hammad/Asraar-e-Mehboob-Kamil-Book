<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Noorani Reader | اسرار محبوب کامل</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #141210;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(20, 18, 16, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
      z-index: 12;
      gap: 8px;
    }

    .top-left, .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .icon-btn, .page-nav-btn {
      background: rgba(255, 255, 255, 0.07);
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      font-size: 20px;
    }
    .page-nav-btn {
      height: 38px;
      padding: 0 16px;
      gap: 6px;
      font-size: 14px;
      letter-spacing: 0.3px;
    }
    .icon-btn:active, .page-nav-btn:active {
      background: rgba(255, 255, 255, 0.18);
      transform: scale(0.96);
    }

    .page-pill {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      border-radius: 30px;
      padding: 0 16px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.65);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 1;
      min-width: 90px;
      justify-content: center;
    }
    .page-pill strong {
      color: #f9e7c2;
      font-weight: 600;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    #scrollArea {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px;
      background: #141210;
      scroll-behavior: smooth;
    }

    .image-wrapper {
      display: inline-block;
      min-width: 100%;
      min-height: 100%;
      position: relative;
    }

    #pageImg {
      display: block;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.08);
      transition: width 0.05s linear, height 0.05s linear;
      will-change: width, height;
      user-select: none;
      pointer-events: auto;
    }

    #bottomBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 18px;
      background: rgba(20, 18, 16, 0.94);
      backdrop-filter: blur(8px);
      border-top: 0.5px solid rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 13;
    }

    .zoom-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 2;
      min-width: 140px;
    }
    .zoom-label {
      font-size: 12px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 10px;
      border-radius: 30px;
      color: #e0d6c8;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #f5d742;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,200,0.6);
    }

    .goto-strip {
      display: flex !important;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.45);
      padding: 4px 8px 4px 12px;
      border-radius: 48px;
      backdrop-filter: blur(4px);
      flex-shrink: 0;
      border: 0.5px solid rgba(245, 215, 66, 0.25);
      min-width: fit-content;
      visibility: visible !important;
    }
    .goto-strip input {
      width: 70px;
      height: 36px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.12);
      border: 0.5px solid rgba(255, 255, 255, 0.3);
      color: #fef3e2;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      padding: 0 8px;
      font-variant-numeric: tabular-nums;
    }
    .goto-strip input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: #f5d742;
    }
    .goto-strip button {
      height: 36px;
      padding: 0 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      background: #f5d742;
      border: none;
      color: #1f1b16;
      cursor: pointer;
      transition: 0.1s linear;
      letter-spacing: 0.3px;
      white-space: nowrap;
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      visibility: visible !important;
    }
    .goto-strip button:active {
      transform: scale(0.95);
      background: #e5c92e;
    }

    .zoom-strip .icon-btn {
      width: 34px;
      height: 34px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 18px;
      font-weight: bold;
    }

    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 44px;
      padding: 12px 24px;
      gap: 12px;
      color: #fef0df;
      font-size: 14px;
      display: none;
      align-items: center;
      z-index: 60;
      border: 0.5px solid rgba(245,215,130,0.3);
      font-weight: 500;
      white-space: nowrap;
    }
    .spin {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(245, 215, 66, 0.3);
      border-top-color: #f5d742;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed;
      bottom: 85px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1b17e6;
      backdrop-filter: blur(14px);
      color: #f7e9d7;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      border: 0.5px solid rgba(245,215,66,0.4);
    }
    #toast.show { opacity: 1; }

    @keyframes hintFade {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.96); }
      20%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80%  { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000000cc;
      backdrop-filter: blur(16px);
      color: #f5e2be;
      padding: 12px 26px;
      border-radius: 60px;
      font-size: 14px;
      z-index: 200;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
      font-weight: 500;
      animation: hintFade 4s ease forwards;
    }

    @media (max-width: 640px) {
      .page-nav-btn span { display: none; }
      .page-nav-btn { padding: 0 12px; }
      .zoom-strip { flex: 1; min-width: 120px; }
      .goto-strip input { width: 60px; height: 34px; font-size: 13px; }
      .goto-strip button { padding: 0 12px; height: 34px; font-size: 12px; }
      .zoom-label { display: none; }
    }
    @media (max-width: 520px) {
      #bottomBar { padding: 8px 12px 14px; gap: 8px; }
      .zoom-strip { gap: 6px; }
      .zoom-strip .icon-btn { width: 32px; height: 32px; }
      .goto-strip { padding: 3px 6px 3px 10px; }
      .goto-strip input { width: 55px; height: 32px; }
      .goto-strip button { padding: 0 10px; height: 32px; }
      .page-pill { padding: 0 10px; height: 36px; font-size: 11px; min-width: 75px; }
      .page-pill strong { font-size: 14px; }
      .top-left, .top-right { gap: 6px; }
      .icon-btn { width: 34px; height: 34px; }
    }
    @media (max-width: 430px) {
      .goto-strip input { width: 50px; }
      .goto-strip button { padding: 0 8px; }
      .zoom-strip { min-width: 100px; }
      #scrollArea { padding: 12px 12px; }
    }
    @media (max-width: 380px) {
      .zoom-strip { display: flex; }
      .zoom-strip .icon-btn { width: 28px; height: 28px; font-size: 16px; }
      input[type="range"] { min-width: 60px; }
      .goto-strip input { width: 46px; font-size: 12px; }
      .goto-strip button { padding: 0 6px; font-size: 11px; }
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { display: none; }
  </style>
</head>
<body>

<div id="topBar">
  <div class="top-left">
    <button class="page-nav-btn" id="prevBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,2 4,7 9,12"/></svg>
      <span>Prev</span>
    </button>
    <button class="page-nav-btn" id="nextBtn">
      <span>Next</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5,2 10,7 5,12"/></svg>
    </button>
  </div>

  <div class="page-pill">
    <strong id="pageNum">1</strong>
    <span>⁄</span>
    <span id="totalNum">934</span>
  </div>

  <div class="top-right">
    <button class="icon-btn" id="fitBtn" title="Fit to screen">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1.5" y="1.5" width="4.5" height="4.5" rx="0.8"/><rect x="10" y="1.5" width="4.5" height="4.5" rx="0.8"/><rect x="1.5" y="10" width="4.5" height="4.5" rx="0.8"/><rect x="10" y="10" width="4.5" height="4.5" rx="0.8"/></svg>
    </button>
  </div>
</div>

<div id="scrollArea">
  <div class="image-wrapper" id="imageWrapper">
    <img id="pageImg" alt="Noorani page" draggable="false">
  </div>
</div>

<div id="bottomBar">
  <div class="zoom-strip">
    <button class="icon-btn" id="zoomOutBtn" style="width:34px;height:34px;">−</button>
    <input type="range" id="zoomSlider" min="0" max="100" value="42" step="1">
    <button class="icon-btn" id="zoomInBtn" style="width:34px;height:34px;">+</button>
    <span class="zoom-label" id="zoomLabel">48%</span>
  </div>
  <div class="goto-strip">
    <input type="number" id="gotoInput" placeholder="Pg" min="1" max="934" inputmode="numeric">
    <button id="gotoBtn">Go</button>
  </div>
</div>

<div id="loader"><div class="spin"></div> Loading page...</div>
<div id="toast"></div>

<script>
  // ====================== LOCAL IMAGE CONFIGURATION ======================
  // Folder structure:
  //   index.html                ← this file
  //   images_jpg/
  //     Asraar e Mehboob Kamil. اسرار محبوب کامل_0000.jpg
  //     Asraar e Mehboob Kamil. اسرار محبوب کامل_0001.jpg
  //     ...
  //     Asraar e Mehboob Kamil. اسرار محبوب کامل_0933.jpg
  // ======================================================================

  const IMAGE_FOLDER = "images_jpg";
  const IMAGE_PREFIX = "Asraar e Mehboob Kamil. \u0627\u0633\u0631\u0627\u0631 \u0645\u062D\u0628\u0648\u0628 \u06A9\u0627\u0645\u0644_";
  const IMAGE_EXT    = ".jpg";
  const TOTAL_PAGES  = 934;

  // Build local path — no server, no endpoint
  function getImageUrl(zeroIdx) {
    const padded = String(zeroIdx).padStart(4, '0');
    return IMAGE_FOLDER + "/" + IMAGE_PREFIX + padded + IMAGE_EXT;
  }

  // ======================================================================

  let currentIdx   = 0;
  let zoomLevel    = 0.48;
  let naturalWidth = 0, naturalHeight = 0;
  let isLoading    = false;
  let pendingRetry = null;

  const imgCache        = {};
  const scrollContainer = document.getElementById('scrollArea');
  const pageImg         = document.getElementById('pageImg');
  const imageWrapper    = document.getElementById('imageWrapper');
  const loaderDiv       = document.getElementById('loader');
  const toastDiv        = document.getElementById('toast');
  const zoomSlider      = document.getElementById('zoomSlider');
  const zoomLabel       = document.getElementById('zoomLabel');
  const pageNumSpan     = document.getElementById('pageNum');
  const gotoInput       = document.getElementById('gotoInput');
  const totalSpan       = document.getElementById('totalNum');
  const prevBtn         = document.getElementById('prevBtn');
  const nextBtn         = document.getElementById('nextBtn');
  const fitBtn          = document.getElementById('fitBtn');
  const zoomInBtn       = document.getElementById('zoomInBtn');
  const zoomOutBtn      = document.getElementById('zoomOutBtn');
  const gotoBtn         = document.getElementById('gotoBtn');

  let toastTimer = null;
  function showToast(msg, duration) {
    duration = duration || 1100;
    toastDiv.textContent = msg;
    toastDiv.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toastDiv.classList.remove('show'); }, duration);
  }

  function syncZoomControls() {
    const minZ = 0.28, maxZ = 3.4;
    const t = Math.min(1, Math.max(0, (zoomLevel - minZ) / (maxZ - minZ)));
    zoomSlider.value = Math.round(t * 100);
    zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
  }

  function applyZoomAndUpdateScroll() {
    if (!naturalWidth || !naturalHeight) return;
    const newWidth  = naturalWidth  * zoomLevel;
    const newHeight = naturalHeight * zoomLevel;
    pageImg.style.width  = newWidth  + 'px';
    pageImg.style.height = newHeight + 'px';
    imageWrapper.style.width   = newWidth  + 'px';
    imageWrapper.style.height  = newHeight + 'px';
    imageWrapper.style.display = 'block';
    syncZoomControls();
    try { localStorage.setItem('noorani_zoom_v2', zoomLevel); } catch(e) {}
  }

  function calculateFitZoom() {
    if (!naturalWidth || !naturalHeight) return 0.48;
    const r = scrollContainer.getBoundingClientRect();
    const fitScale = Math.min((r.width - 28) / naturalWidth, (r.height - 28) / naturalHeight);
    return Math.min(3.2, Math.max(0.28, fitScale));
  }

  function fitToScreen() {
    if (!naturalWidth) return;
    zoomLevel = calculateFitZoom();
    applyZoomAndUpdateScroll();
    scrollContainer.scrollTop  = 0;
    scrollContainer.scrollLeft = 0;
    showToast("✓ Fit to screen", 700);
  }

  function zoomIn() {
    zoomLevel = Math.min(3.4, zoomLevel + 0.12);
    applyZoomAndUpdateScroll();
    showToast(Math.round(zoomLevel * 100) + '%', 400);
  }

  function zoomOut() {
    zoomLevel = Math.max(0.28, zoomLevel - 0.12);
    applyZoomAndUpdateScroll();
    showToast(Math.round(zoomLevel * 100) + '%', 400);
  }

  function preloadNearby(current) {
    [current+1, current+2, current-1, current-2]
      .filter(function(p) { return p >= 0 && p < TOTAL_PAGES; })
      .forEach(function(p) {
        if (!imgCache[p]) {
          const img = new Image();
          img.onload = function() { imgCache[p] = img; };
          img.src = getImageUrl(p);
        }
      });
    Object.keys(imgCache).forEach(function(k) {
      if (Math.abs(parseInt(k) - current) > 8 && parseInt(k) !== current) delete imgCache[k];
    });
  }

  function loadPageByIndex(newIndex) {
    if (newIndex < 0 || newIndex >= TOTAL_PAGES) {
      showToast(newIndex < 0 ? "📖 First page" : "📘 Last page", 1000);
      return;
    }
    if (isLoading) { showToast("Loading, please wait...", 500); return; }
    if (pendingRetry) { clearTimeout(pendingRetry); pendingRetry = null; }

    if (imgCache[newIndex] && imgCache[newIndex].complete && imgCache[newIndex].naturalWidth > 0) {
      applyLoadedImage(imgCache[newIndex], newIndex);
      return;
    }

    isLoading = true;
    loaderDiv.style.display = 'flex';

    const tempImg = new Image();
    tempImg.onload = function() {
      imgCache[newIndex] = tempImg;
      applyLoadedImage(tempImg, newIndex);
      isLoading = false;
      loaderDiv.style.display = 'none';
      preloadNearby(newIndex);
    };
    tempImg.onerror = function() {
      loaderDiv.style.display = 'none';
      isLoading = false;
      showToast('⚠️ Page ' + (newIndex + 1) + ' not found — run convert_jp2_to_jpg.bat first', 2500);
    };
    tempImg.src = getImageUrl(newIndex);
  }

  function applyLoadedImage(img, idx) {
    if (!img.naturalWidth || !img.naturalHeight) {
      showToast("Image decode failed", 900);
      return;
    }
    naturalWidth  = img.naturalWidth;
    naturalHeight = img.naturalHeight;
    pageImg.src   = img.src;
    currentIdx    = idx;
    pageNumSpan.textContent = currentIdx + 1;
    gotoInput.value         = currentIdx + 1;
    applyZoomAndUpdateScroll();
    scrollContainer.scrollLeft = 0;
    scrollContainer.scrollTop  = 0;
    try { localStorage.setItem('noorani_last_page_v2', currentIdx); } catch(e) {}
    preloadNearby(currentIdx);

    if (!localStorage.getItem('nr_pan_hint')) {
      localStorage.setItem('nr_pan_hint', '1');
      const hintDiv = document.createElement('div');
      hintDiv.id = 'hint';
      hintDiv.textContent = '🖱️ Drag to pan · Pinch to zoom';
      document.body.appendChild(hintDiv);
      setTimeout(function() { if (hintDiv.remove) hintDiv.remove(); }, 4200);
    }
  }

  function goToPage(pageNum) {
    const p = Math.min(TOTAL_PAGES, Math.max(1, parseInt(pageNum)));
    if (isNaN(p)) { showToast('Enter a number 1–' + TOTAL_PAGES); return; }
    loadPageByIndex(p - 1);
  }

  // Zoom slider
  zoomSlider.addEventListener('input', function(e) {
    const minZ = 0.28, maxZ = 3.4;
    zoomLevel = minZ + (e.target.value / 100) * (maxZ - minZ);
    applyZoomAndUpdateScroll();
  });

  pageImg.addEventListener('load', function() {
    if (naturalWidth && naturalHeight) applyZoomAndUpdateScroll();
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    switch(e.key) {
      case 'ArrowLeft':  e.preventDefault(); scrollContainer.scrollBy({ left: -90, behavior: 'smooth' }); break;
      case 'ArrowRight': e.preventDefault(); scrollContainer.scrollBy({ left:  90, behavior: 'smooth' }); break;
      case 'ArrowUp':    e.preventDefault(); scrollContainer.scrollBy({ top:  -90, behavior: 'smooth' }); break;
      case 'ArrowDown':  e.preventDefault(); scrollContainer.scrollBy({ top:   90, behavior: 'smooth' }); break;
      case '+': case '=': e.preventDefault(); zoomIn();  break;
      case '-':           e.preventDefault(); zoomOut(); break;
      case 'f': case 'F': e.preventDefault(); fitToScreen(); break;
      case 'PageDown': e.preventDefault(); loadPageByIndex(currentIdx + 1); break;
      case 'PageUp':   e.preventDefault(); loadPageByIndex(currentIdx - 1); break;
      case 'Home': e.preventDefault(); loadPageByIndex(0); break;
      case 'End':  e.preventDefault(); loadPageByIndex(TOTAL_PAGES - 1); break;
    }
  });

  // Shift+wheel = horizontal pan, Ctrl+wheel = zoom
  scrollContainer.addEventListener('wheel', function(e) {
    if (e.shiftKey) {
      e.preventDefault();
      scrollContainer.scrollLeft += e.deltaY * 1.2;
    } else if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      e.deltaY < 0 ? zoomIn() : zoomOut();
    }
  }, { passive: false });

  // Pinch zoom
  let initialPinchDist = 0, startZoomPinch = zoomLevel;
  scrollContainer.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      initialPinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      startZoomPinch = zoomLevel;
    }
  }, { passive: false });

  scrollContainer.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && initialPinchDist > 5) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const newZoom = Math.min(3.4, Math.max(0.28, startZoomPinch * (dist / initialPinchDist)));
      if (Math.abs(newZoom - zoomLevel) > 0.01) {
        zoomLevel = newZoom;
        applyZoomAndUpdateScroll();
      }
    }
  }, { passive: false });

  scrollContainer.addEventListener('touchend', function() { initialPinchDist = 0; });

  window.addEventListener('resize', function() {
    if (naturalWidth) applyZoomAndUpdateScroll();
  });

  // Buttons
  prevBtn.addEventListener('click',  function() { loadPageByIndex(currentIdx - 1); });
  nextBtn.addEventListener('click',  function() { loadPageByIndex(currentIdx + 1); });
  fitBtn.addEventListener('click',   fitToScreen);
  zoomInBtn.addEventListener('click', zoomIn);
  zoomOutBtn.addEventListener('click', zoomOut);
  gotoBtn.addEventListener('click',  function() { goToPage(gotoInput.value); });
  gotoInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); goToPage(gotoInput.value); }
  });

  // Init
  function init() {
    totalSpan.textContent = TOTAL_PAGES;
    try {
      const savedPage = parseInt(localStorage.getItem('noorani_last_page_v2'));
      if (!isNaN(savedPage) && savedPage >= 0 && savedPage < TOTAL_PAGES) currentIdx = savedPage;
      const savedZoom = parseFloat(localStorage.getItem('noorani_zoom_v2'));
      if (!isNaN(savedZoom) && savedZoom >= 0.28 && savedZoom <= 3.4) zoomLevel = savedZoom;
    } catch(e) {}

    gotoInput.value = currentIdx + 1;
    gotoInput.max   = TOTAL_PAGES;
    gotoInput.min   = 1;
    loadPageByIndex(currentIdx);
  }

  init();
</script>
