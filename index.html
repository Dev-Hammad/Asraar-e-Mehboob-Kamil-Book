<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Noorani Reader | Pan & Zoom</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #141210;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOP BAR ===== */
    #topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 18px;
      background: rgba(20, 18, 16, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
      z-index: 12;
    }

    .top-left, .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* buttons */
    .icon-btn, .page-nav-btn {
      background: rgba(255, 255, 255, 0.07);
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      font-size: 20px;
    }
    .page-nav-btn {
      height: 38px;
      padding: 0 18px;
      gap: 8px;
      font-size: 14px;
      letter-spacing: 0.3px;
    }
    .icon-btn:active, .page-nav-btn:active {
      background: rgba(255, 255, 255, 0.18);
      transform: scale(0.96);
    }

    .page-pill {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      border-radius: 30px;
      padding: 0 18px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.65);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
    }
    .page-pill strong {
      color: #f9e7c2;
      font-weight: 600;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    /* ===== SCROLL AREA (PAN ZONE) ===== */
    #scrollArea {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px;
      background: #141210;
      scroll-behavior: smooth;
    }

    #pageImg {
      display: block;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.08);
      transition: width 0.05s linear, height 0.05s linear;
      will-change: width, height;
      user-select: none;
      pointer-events: auto;
    }

    /* ===== BOTTOM CONTROLS (subtle & clean) ===== */
    #bottomBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 18px 18px;
      background: rgba(20, 18, 16, 0.92);
      backdrop-filter: blur(6px);
      border-top: 0.5px solid rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
      gap: 16px;
      flex-wrap: wrap;
    }

    .zoom-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 2;
      min-width: 140px;
    }
    .zoom-label {
      font-size: 12px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 10px;
      border-radius: 30px;
      color: #e0d6c8;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #f5d742;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,200,0.6);
    }

    /* Goto page area */
    .goto-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.25);
      padding: 4px 8px 4px 12px;
      border-radius: 48px;
      backdrop-filter: blur(4px);
    }
    .goto-strip input {
      width: 60px;
      height: 34px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.1);
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      color: #fef3e2;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      padding: 0 6px;
      font-variant-numeric: tabular-nums;
    }
    .goto-strip input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: #f5d742;
    }
    .goto-strip button {
      height: 34px;
      padding: 0 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      background: #f5d742;
      border: none;
      color: #1f1b16;
      cursor: pointer;
      transition: 0.1s linear;
      letter-spacing: 0.3px;
    }
    .goto-strip button:active {
      transform: scale(0.95);
      background: #e5c92e;
    }

    /* mini zoom icons inside zoom strip */
    .zoom-strip .icon-btn {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 18px;
      font-weight: bold;
    }

    /* loader */
    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 44px;
      padding: 12px 24px;
      gap: 12px;
      color: #fef0df;
      font-size: 14px;
      display: none;
      align-items: center;
      z-index: 60;
      border: 0.5px solid rgba(255,215,130,0.3);
      font-weight: 500;
    }
    .spin {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(245, 215, 66, 0.3);
      border-top-color: #f5d742;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed;
      bottom: 85px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1b17e6;
      backdrop-filter: blur(14px);
      color: #f7e9d7;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      border: 0.5px solid rgba(245,215,66,0.4);
    }
    #toast.show { opacity: 1; }

    /* subtle hint */
    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000000cc;
      backdrop-filter: blur(16px);
      color: #f5e2be;
      padding: 12px 26px;
      border-radius: 60px;
      font-size: 14px;
      z-index: 200;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
      font-weight: 500;
      animation: hintFade 4s ease forwards;
    }
    @keyframes hintFade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.96); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    @media (max-width: 560px) {
      .page-nav-btn span { display: none; }
      .page-nav-btn { padding: 0 14px; }
      .zoom-strip { flex: 1; }
      .goto-strip input { width: 50px; }
      #bottomBar { padding: 8px 12px 14px; gap: 8px; }
      .page-pill { padding: 0 12px; height: 36px; font-size: 12px; }
    }
    @media (max-width: 460px) {
      .zoom-label { display: none; }
      .zoom-strip { min-width: auto; }
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { display: none; }
  </style>
</head>
<body>

<div id="topBar">
  <div class="top-left">
    <button class="page-nav-btn" id="prevBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,2 4,7 9,12"/></svg>
      <span>Prev</span>
    </button>
    <button class="page-nav-btn" id="nextBtn">
      <span>Next</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5,2 10,7 5,12"/></svg>
    </button>
  </div>

  <div class="page-pill">
    <strong id="pageNum">1</strong>
    <span>⁄</span>
    <span id="totalNum">934</span>
  </div>

  <div class="top-right">
    <button class="icon-btn" id="fitBtn" title="Fit to width / screen">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1.5" y="1.5" width="4.5" height="4.5" rx="0.8"/><rect x="10" y="1.5" width="4.5" height="4.5" rx="0.8"/><rect x="1.5" y="10" width="4.5" height="4.5" rx="0.8"/><rect x="10" y="10" width="4.5" height="4.5" rx="0.8"/></svg>
    </button>
  </div>
</div>

<div id="scrollArea">
  <img id="pageImg" alt="Noorani page" draggable="false">
</div>

<div id="bottomBar">
  <div class="zoom-strip">
    <button class="icon-btn" id="zoomOutBtn" style="width:34px;height:34px;">−</button>
    <input type="range" id="zoomSlider" min="0" max="100" value="42" step="1">
    <button class="icon-btn" id="zoomInBtn" style="width:34px;height:34px;">+</button>
    <span class="zoom-label" id="zoomLabel">48%</span>
  </div>
  <div class="goto-strip">
    <input type="number" id="gotoInput" placeholder="Page" min="1" max="934">
    <button id="gotoBtn">Go</button>
  </div>
</div>

<div id="loader"><div class="spin"></div> Loading page...</div>
<div id="toast"></div>

<script>
  // ================= CONFIGURATION =================
  const ARCHIVE_BASE = "https://ia803205.us.archive.org/view_archive.php?archive=/29/items/Asraar-e-Mehboob-Kamil._20260528/Asraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_jp2.zip&file=Asraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_jp2%2FAsraar%20e%20Mehboob%20Kamil.%20%D8%A7%D8%B3%D8%B1%D8%A7%D8%B1%20%D9%85%D8%AD%D8%A8%D9%88%D8%A8%20%DA%A9%D8%A7%D9%85%D9%84_";
  const TOTAL_PAGES = 934;
  let currentIdx = 0;          // zero-indexed
  let zoomLevel = 0.48;        // base zoom factor (relative to natural)
  let naturalWidth = 0, naturalHeight = 0;
  let isLoading = false;

  // cache object & preload management
  const imgCache = {};
  let pendingPreload = new Set();

  // DOM elements
  const scrollContainer = document.getElementById('scrollArea');
  const pageImg = document.getElementById('pageImg');
  const loaderDiv = document.getElementById('loader');
  const toastDiv = document.getElementById('toast');
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomLabel = document.getElementById('zoomLabel');
  const pageNumSpan = document.getElementById('pageNum');
  const gotoInput = document.getElementById('gotoInput');
  const totalSpan = document.getElementById('totalNum');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const fitBtn = document.getElementById('fitBtn');
  const zoomInBtn = document.getElementById('zoomInBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');
  const gotoBtn = document.getElementById('gotoBtn');

  let toastTimer = null;

  // helper: short toast
  function showToast(msg, duration = 1100) {
    toastDiv.textContent = msg;
    toastDiv.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastDiv.classList.remove('show'), duration);
  }

  // get image URL for page (1-indexed to 0-index mapping)
  function getImageUrl(pageZeroIdx) {
    const pageNumber = pageZeroIdx + 1;
    const padded = String(pageNumber).padStart(4, '0');
    return ARCHIVE_BASE + padded + ".jp2&ext=jpg";
  }

  // update zoom slider & label from zoomLevel
  function syncZoomControls() {
    const minZoom = 0.28;
    const maxZoom = 3.0;
    let t = (zoomLevel - minZoom) / (maxZoom - minZoom);
    t = Math.min(1, Math.max(0, t));
    zoomSlider.value = Math.round(t * 100);
    zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
  }

  // apply current zoom to image element (preserving dimensions)
  function applyZoomToImage() {
    if (!naturalWidth || !naturalHeight) return;
    pageImg.style.width = (naturalWidth * zoomLevel) + 'px';
    pageImg.style.height = (naturalHeight * zoomLevel) + 'px';
    syncZoomControls();
    // persist zoom preference
    try { localStorage.setItem('noorani_zoom', zoomLevel); } catch(e) {}
  }

  // best fit: fill visible area without overflow (respect margins)
  function calculateFitZoom() {
    if (!naturalWidth || !naturalHeight) return 0.48;
    const containerRect = scrollContainer.getBoundingClientRect();
    const availableWidth = containerRect.width - 30;   // comfortable padding
    const availableHeight = containerRect.height - 28;
    const fitScale = Math.min(availableWidth / naturalWidth, availableHeight / naturalHeight);
    return Math.min(2.9, Math.max(0.28, fitScale));
  }

  // fit to screen (preserve scroll reset)
  function fitToScreen() {
    if (!naturalWidth) return;
    const newZoom = calculateFitZoom();
    zoomLevel = newZoom;
    applyZoomToImage();
    // reset pan position to top-left after fit
    scrollContainer.scrollTop = 0;
    scrollContainer.scrollLeft = 0;
    showToast("🖼️ Fit to screen", 700);
  }

  // zoom in / out with bounds
  function zoomIn() {
    let newZoom = zoomLevel + 0.12;
    if (newZoom > 3.0) newZoom = 3.0;
    zoomLevel = newZoom;
    applyZoomToImage();
    showToast(`${Math.round(zoomLevel*100)}%`, 400);
  }
  function zoomOut() {
    let newZoom = zoomLevel - 0.12;
    if (newZoom < 0.28) newZoom = 0.28;
    zoomLevel = newZoom;
    applyZoomToImage();
    showToast(`${Math.round(zoomLevel*100)}%`, 400);
  }

  // smart preload adjacent pages (neighbors +2)
  function preloadNearbyPages(currentPageZero) {
    const toPreload = [currentPageZero + 1, currentPageZero + 2, currentPageZero - 1, currentPageZero - 2]
      .filter(p => p >= 0 && p < TOTAL_PAGES);
    for (let p of toPreload) {
      if (!imgCache[p] && !pendingPreload.has(p)) {
        const img = new Image();
        pendingPreload.add(p);
        img.onload = () => {
          imgCache[p] = img;
          pendingPreload.delete(p);
        };
        img.onerror = () => pendingPreload.delete(p);
        img.src = getImageUrl(p);
      }
    }
    // clean distant cache (keep last 8)
    const keys = Object.keys(imgCache).map(Number);
    for (let k of keys) {
      if (Math.abs(k - currentPageZero) > 8 && k !== currentPageZero) {
        delete imgCache[k];
      }
    }
  }

  // core page loader
  function loadPageByIndex(newIndex) {
    if (newIndex < 0 || newIndex >= TOTAL_PAGES) {
      if (newIndex < 0) showToast("📖 First page reached", 900);
      else showToast("📘 Last page reached", 900);
      return;
    }
    if (isLoading) {
      showToast("Loading in progress...", 500);
      return;
    }

    // if already cached and ready
    if (imgCache[newIndex] && imgCache[newIndex].complete && imgCache[newIndex].naturalWidth > 0) {
      const cachedImg = imgCache[newIndex];
      applyLoadedImage(cachedImg, newIndex);
      return;
    }

    isLoading = true;
    loaderDiv.style.display = 'flex';
    const tempImg = new Image();
    tempImg.onload = () => {
      // store in cache
      imgCache[newIndex] = tempImg;
      applyLoadedImage(tempImg, newIndex);
      isLoading = false;
      loaderDiv.style.display = 'none';
      preloadNearbyPages(newIndex);
    };
    tempImg.onerror = () => {
      loaderDiv.style.display = 'none';
      isLoading = false;
      showToast("⚠️ Could not load page. Retrying...", 1500);
      setTimeout(() => loadPageByIndex(newIndex), 600);
    };
    tempImg.src = getImageUrl(newIndex);
  }

  function applyLoadedImage(img, idx) {
    if (!img.naturalWidth) {
      showToast("Image decoding error", 1000);
      return;
    }
    // set natural dimensions
    naturalWidth = img.naturalWidth;
    naturalHeight = img.naturalHeight;
    pageImg.src = img.src;
    currentIdx = idx;
    // update UI page info
    pageNumSpan.textContent = currentIdx + 1;
    gotoInput.value = currentIdx + 1;
    // apply current zoom (preserve global zoom)
    applyZoomToImage();
    // reset scroll position for good UX (no weird offset)
    scrollContainer.scrollTop = 0;
    scrollContainer.scrollLeft = 0;
    // save current page to localStorage
    try { localStorage.setItem('noorani_last_page', currentIdx); } catch(e) {}
    // preload neighbors
    preloadNearbyPages(currentIdx);
    // optional hint only first time
    if (!localStorage.getItem('nr_pan_hint')) {
      localStorage.setItem('nr_pan_hint', '1');
      const hintDiv = document.createElement('div');
      hintDiv.id = 'hint';
      hintDiv.textContent = '✨ Drag to pan · Pinch to zoom ✨';
      document.body.appendChild(hintDiv);
      setTimeout(() => hintDiv.remove(), 4000);
    }
  }

  // public goto (1-indexed)
  function goToPage(pageNum) {
    let p = parseInt(pageNum);
    if (isNaN(p)) { showToast(`Enter 1–${TOTAL_PAGES}`); return; }
    p = Math.min(TOTAL_PAGES, Math.max(1, p));
    loadPageByIndex(p - 1);
  }

  // event listeners
  prevBtn.addEventListener('click', () => loadPageByIndex(currentIdx - 1));
  nextBtn.addEventListener('click', () => loadPageByIndex(currentIdx + 1));
  fitBtn.addEventListener('click', fitToScreen);
  zoomInBtn.addEventListener('click', zoomIn);
  zoomOutBtn.addEventListener('click', zoomOut);
  gotoBtn.addEventListener('click', () => goToPage(gotoInput.value));
  gotoInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') goToPage(gotoInput.value); });

  // zoom slider
  zoomSlider.addEventListener('input', (e) => {
    const minZ = 0.28, maxZ = 3.0;
    const t = e.target.value / 100;
    zoomLevel = minZ + t * (maxZ - minZ);
    applyZoomToImage();
  });

  // ========== X & Y AXIS SCROLLING FUNCTIONALITY (already via overflow) ==========
  // The scrollArea provides both horizontal and vertical scrolling naturally (touch, mouse drag, trackpad)
  // But to enhance visibility: we also ensure that keyboard arrows shift the view when image is zoomed
  // Also optional shift + wheel for horizontal scrolling is native. Provide helper for smooth pan awareness.
  
  // Additional: enhance scroll with Shift + mousewheel for horizontal pan.
  scrollContainer.addEventListener('wheel', (e) => {
    if (e.shiftKey) {
      e.preventDefault();
      scrollContainer.scrollLeft += e.deltaY * 1.2;
    } else if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      e.deltaY < 0 ? zoomIn() : zoomOut();
    }
  }, { passive: false });
  
  // Arrow keys panning (if image is bigger than viewport) – for better accessibility
  document.addEventListener('keydown', (e) => {
    if (document.activeElement?.tagName === 'INPUT') return;
    const target = e.key;
    const stepX = 80;
    const stepY = 80;
    if (target === 'ArrowLeft') {
      e.preventDefault();
      scrollContainer.scrollBy({ left: -stepX, behavior: 'smooth' });
    } else if (target === 'ArrowRight') {
      e.preventDefault();
      scrollContainer.scrollBy({ left: stepX, behavior: 'smooth' });
    } else if (target === 'ArrowUp') {
      e.preventDefault();
      scrollContainer.scrollBy({ top: -stepY, behavior: 'smooth' });
    } else if (target === 'ArrowDown') {
      e.preventDefault();
      scrollContainer.scrollBy({ top: stepY, behavior: 'smooth' });
    } else if (target === '+' || target === '=') {
      e.preventDefault();
      zoomIn();
    } else if (target === '-') {
      e.preventDefault();
      zoomOut();
    } else if (target === 'f' || target === 'F') {
      e.preventDefault();
      fitToScreen();
    }
  });
  
  // Pinch to zoom gesture on the scroll area (two-finger)
  let initialPinchDist = 0;
  let initialZoom = zoomLevel;
  scrollContainer.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      initialPinchDist = Math.hypot(dx, dy);
      initialZoom = zoomLevel;
    }
  }, { passive: false });
  
  scrollContainer.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && initialPinchDist > 5) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const newDist = Math.hypot(dx, dy);
      if (newDist > 0) {
        let scaleFactor = newDist / initialPinchDist;
        let newZoom = initialZoom * scaleFactor;
        newZoom = Math.min(3.0, Math.max(0.28, newZoom));
        if (Math.abs(newZoom - zoomLevel) > 0.01) {
          zoomLevel = newZoom;
          applyZoomToImage();
        }
      }
    }
  }, { passive: false });
  
  scrollContainer.addEventListener('touchend', () => {
    initialPinchDist = 0;
  });

  // restore user settings
  function initSettings() {
    totalSpan.textContent = TOTAL_PAGES;
    try {
      const savedPage = localStorage.getItem('noorani_last_page');
      if (savedPage !== null && !isNaN(parseInt(savedPage))) {
        let pg = parseInt(savedPage);
        if (pg >= 0 && pg < TOTAL_PAGES) currentIdx = pg;
      }
      const savedZoom = localStorage.getItem('noorani_zoom');
      if (savedZoom !== null && !isNaN(parseFloat(savedZoom))) {
        let z = parseFloat(savedZoom);
        if (z >= 0.28 && z <= 3.0) zoomLevel = z;
      }
    } catch(e) {}
    // start loading initial page
    loadPageByIndex(currentIdx);
  }
